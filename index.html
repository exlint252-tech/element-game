<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periodic Map Guesser</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background-color: #1e293b;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .wrapper {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { margin-bottom: 5px; color: #38bdf8; }
        .instructions { color: #94a3b8; margin-bottom: 20px; font-size: 14px; }
        
        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 4px;
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }
        
        .cell {
            aspect-ratio: 1;
            background-color: #334155;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s, background-color 0.3s;
            color: #cbd5e1;
        }
        .cell:hover {
            transform: scale(1.08);
            background-color: #475569;
        }
        
        .empty {
            background-color: transparent;
            cursor: default;
            pointer-events: none;
        }
        
        /* Disabled state for already guessed elements */
        .guessed {
            pointer-events: none; /* Stops it from being clickable again */
            transform: none !important;
            opacity: 0.8;
        }
        
        .freezing { background-color: #1d4ed8 !important; color: white; }
        .cold { background-color: #3b82f6 !important; color: white; }
        .warm { background-color: #f97316 !important; color: white; }
        .hot { background-color: #ef4444 !important; color: white; }
        .correct { background-color: #22c55e !important; color: white; animation: win-pop 0.5s ease; }
        
        #status-msg {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 27px;
        }
        .win-banner { color: #22c55e; font-size: 24px; display: none; }
        
        @keyframes win-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Periodic Map Guesser</h1>
    <p class="instructions">Click any element on the grid to guess. The closer you are to the secret element, the hotter the tile turns! You can only guess each tile once.</p>
    
    <div class="periodic-table" id="grid"></div>
    
    <div id="status-msg">Click a tile to start!</div>
    <div id="win-banner" class="win-banner">🎉 Amazing! You found it! Refresh to play again.</div>
</div>

<script>
const elementData = [
    { symbol: "H", row: 1, col: 1 },
    { symbol: "He", row: 1, col: 18 },
    { symbol: "Li", row: 2, col: 1 },
    { symbol: "Be", row: 2, col: 2 },
    { symbol: "B", row: 2, col: 13 },
    { symbol: "C", row: 2, col: 14 },
    { symbol: "N", row: 2, col: 15 },
    { symbol: "O", row: 2, col: 16 },
    { symbol: "F", row: 2, col: 17 },
    { symbol: "Ne", row: 2, col: 18 },
    { symbol: "Na", row: 3, col: 1 },
    { symbol: "Mg", row: 3, col: 2 },
    { symbol: "Al", row: 3, col: 13 },
    { symbol: "Si", row: 3, col: 14 },
    { symbol: "P", row: 3, col: 15 },
    { symbol: "S", row: 3, col: 16 },
    { symbol: "Cl", row: 3, col: 17 },
    { symbol: "Ar", row: 3, col: 18 }
];

const secretElement = elementData[Math.floor(Math.random() * elementData.length)];
let gameActive = true;

const gridContainer = document.getElementById('grid');
const statusMsg = document.getElementById('status-msg');
const winBanner = document.getElementById('win-banner');

for (let r = 1; r <= 3; r++) {
    for (let c = 1; c <= 18; c++) {
        const cell = document.createElement('div');
        const el = elementData.find(item => item.row === r && item.col === c);
        
        if (el) {
            cell.className = "cell";
            cell.innerText = el.symbol;
            cell.addEventListener('click', () => handleGuess(el, cell));
        } else {
            cell.className = "cell empty";
        }
        gridContainer.appendChild(cell);
    }
}

function handleGuess(guessedEl, cellElement) {
    if (!gameActive || cellElement.classList.contains('guessed')) return;
    
    // Mark it as guessed so it can't be clicked again
    cellElement.classList.add('guessed');
    
    const rowDiff = Math.abs(guessedEl.row - secretElement.row);
    const colDiff = Math.abs(guessedEl.col - secretElement.col);
    const distance = rowDiff + colDiff;
    
    if (distance === 0) {
        cellElement.classList.add('correct');
        statusMsg.style.display = "none";
        winBanner.style.display = "block";
        gameActive = false;
    } else if (distance <= 2) {
        cellElement.classList.add('hot');
        statusMsg.innerHTML = `🔥 <b>${guessedEl.symbol}</b> is Burning Hot!`;
    } else if (distance <= 4) {
        cellElement.classList.add('warm');
        statusMsg.innerHTML = `🌤️ <b>${guessedEl.symbol}</b> is Warm.`;
    } else if (distance <= 8) {
        cellElement.classList.add('cold');
        statusMsg.innerHTML = `❄️ <b>${guessedEl.symbol}</b> is Chilly.`;
    } else {
        cellElement.classList.add('freezing');
        statusMsg.innerHTML = `🥶 <b>${guessedEl.symbol}</b> is Freezing Cold!`;
    }
}
</script>

</body>
</html>
