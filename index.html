<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .wrapper {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            margin: 5px 0 15px 0;
            color: #38bdf8;
            font-size: 32px;
        }

        /* Streak Tracker Bar */
        .streak-bar {
            background-color: #1e293b;
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto 15px auto;
            border: 1px solid #334155;
            font-weight: bold;
        }
        
        .game-controls {
            margin: 10px auto 15px auto;
            max-width: 500px;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 2;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #334155;
            background-color: #1e293b;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: center;
        }
        input:focus { border-color: #38bdf8; }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-primary { background-color: #38bdf8; color: #0f172a; }
        .btn-primary:hover { background-color: #0ea5e9; }
        
        #submit-btn { background-color: #38bdf8; color: #0f172a; flex: 1; }
        #submit-btn:hover { background-color: #0ea5e9; }
        
        #giveup-btn { background-color: #475569; color: #f8fafc; flex: 1; }
        #giveup-btn:hover { background-color: #64748b; }

        #status-msg {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 30px;
            transition: color 0.3s ease;
        }

        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 4px;
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            animation: table-intro 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .cell {
            aspect-ratio: 1;
            background-color: #475569;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            color: transparent; 
            user-select: none;
            transition: background-color 0.4s, color 0.4s;
        }
        
        .empty { background-color: transparent; }
        .spacer-row { grid-column: span 18; height: 25px; }
        
        .freezing { background-color: #1d4ed8 !important; color: #ffffff !important; }
        .cold { background-color: #3b82f6 !important; color: #ffffff !important; }
        .warm { background-color: #f97316 !important; color: #ffffff !important; }
        .hot { background-color: #ef4444 !important; color: #ffffff !important; }
        .correct { background-color: #22c55e !important; color: #ffffff !important; animation: win-pop 0.5s ease; }
        .giveup-reveal { background-color: #a855f7 !important; color: #ffffff !important; }

        .txt-freezing { color: #60a5fa; }
        .txt-cold { color: #93c5fd; }
        .txt-warm { color: #fdba74; }
        .txt-hot { color: #fca5a5; }
        .txt-correct { color: #86efac; }
        
        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.85);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease; z-index: 999;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box {
            background-color: #1e293b; padding: 30px; border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7);
            border: 2px solid #334155; max-width: 400px; width: 90%;
            transform: scale(0.8); transition: transform 0.3s ease;
            display: flex; flex-direction: column; gap: 15px;
        }
        .modal-overlay.show .modal-box { transform: scale(1); }

        @keyframes win-pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes table-intro { 0% { opacity: 0; transform: scale(0.96) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Element Game</h1>

    <div class="streak-bar">
        <span>🔥 Current Streak: <span id="bar-streak" style="color: #f59e0b;">0</span></span>
        <span>🏆 Best Streak: <span id="bar-best" style="color: #38bdf8;">0</span></span>
    </div>

    <div class="game-controls">
        <input type="text" id="guess-input" placeholder="Type Element Name or Symbol..." autocomplete="off" autofocus>
        <button id="submit-btn">Guess</button>
        <button id="giveup-btn">Give Up</button>
    </div>
    
    <div id="status-msg"></div>
    <div class="periodic-table" id="grid"></div>
</div>

<div class="modal-overlay" id="win-modal">
    <div class="modal-box" id="modal-border">
        <h2 id="modal-title">🎉 Victory!</h2>
        <p class="stat-line">The secret element was: <span id="secret-reveal" style="color:#38bdf8;"></span></p>
        <div class="stat-line">Guesses Made: <span id="stat-guesses">0</span></div>
        <div class="stat-line">Time Elapsed: <span id="stat-time">0s</span></div>
        <hr style="border: 0; border-top: 1px solid #334155; margin: 15px 0;">
        <div class="stat-line">Current Streak: <span id="stat-streak" style="color: #f59e0b;">0</span></div>
        <div class="stat-line">Best Streak: <span id="stat-best-streak" style="color: #38bdf8;">0</span></div>
        <button class="play-again-btn btn-primary" id="reset-btn">Play Again</button>
    </div>
</div>

<script>

    { name: "cerium", symbol: "Ce", row: 9, col: 4 }, { name: "praseodymium", symbol: "Pr", row: 9, col: 5 }, { name: "neodymium", symbol: "Nd", row: 9, col: 6 }, { name: "promethium", symbol: "Pm", row: 9, col: 7 }, { name: "samarium", symbol: "Sm", row: 9, col: 8 }, { name: "europium", symbol: "Eu", row: 9, col: 9 }, { name: "gadolinium", symbol: "Gd", row: 9, col: 10 }, { name: "terbium", symbol: "Tb", row: 9, col: 11 }, { name: "dysprosium", symbol: "Dy", row: 9, col: 12 }, { name: "holmium", symbol: "Ho", row: 9, col: 13 }, { name: "erbium", symbol: "Er", row: 9, col: 14 }, { name: "thulium", symbol: "Tm", row: 9, col: 15 }, { name: "ytterbium", symbol: "Yb", row: 9, col: 16 }, { name: "lutetium", symbol: "Lu", row: 9, col: 17 },
    { name: "thorium", symbol: "Th", row: 10, col: 4 }, { name: "protactinium", symbol: "Pa", row: 10, col: 5 }, { name: "uranium", symbol: "U", row: 10, col: 6 }, { name: "neptunium", symbol: "Np", row: 10, col: 7 }, { name: "plutonium", symbol: "Pu", row: 10, col: 8 }, { name: "americium", symbol: "Am", row: 10, col: 9 }, { name: "curium", symbol: "Cm", row: 10, col: 10 }, { name: "berkelium", symbol: "Bk", row: 10, col: 11 }, { name: "californium", symbol: "Cf", row: 10, col: 12 }, { name: "einsteinium", symbol: "Es", row: 10, col: 13 }, { name: "fermium", symbol: "Fm", row: 10, col: 14 }, { name: "mendelevium", symbol: "Md", row: 10, col: 15 }, { name: "nobelium", symbol: "No", row: 10, col: 16 }, { name: "lawrencium", symbol: "Lr", row: 10, col: 17 }
];

let secretElement;
let gameActive = true;
let guessedElements = new Set();
let guessCount = 0;
let startTime;
let audioCtx = null;

const gridContainer = document.getElementById('grid');
const inputField = document.getElementById('guess-input');
const submitBtn = document.getElementById('submit-btn');
const giveupBtn = document.getElementById('giveup-btn');
const statusMsg = document.getElementById('status-msg');

const barStreak = document.getElementById('bar-streak');
const barBest = document.getElementById('bar-best');

// Modal Elements
const winModal = document.getElementById('win-modal');
const modalBorder = document.getElementById('modal-border');
const modalTitle = document.getElementById('modal-title');
const secretReveal = document.getElementById('secret-reveal');
const statGuesses = document.getElementById('stat-guesses');
const statTime = document.getElementById('stat-time');
const statStreak = document.getElementById('stat-streak');
const statBestStreak = document.getElementById('stat-best-streak');
const resetBtn = document.getElementById('reset-btn');

const tileMap = {};

// Background Music Synth Generator
function initAudio() {
    if (audioCtx) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playChords() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const chords = [
                [110.00, 138.61, 164.81], [116.54, 138.61, 174.61], [98.00, 123.47, 146.83]
            ];
            let currentChord = chords[Math.floor(Math.random() * chords.length)];
            currentChord.forEach(freq => {
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.015, audioCtx.currentTime + 2);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 7);
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 7);
            });
            setTimeout(playChords, 6500);
        }
        playChords();
    } catch(e) { console.log("Audio issues"); }
}

function startAudioContext() {
    if (audioCtx && audioCtx.state === 'suspended') { audioCtx.resume(); } else { initAudio(); }
}

function updateTopStreakBar() {
    let currentStreak = parseInt(localStorage.getItem('local_elem_streak') || '0');
    let bestStreak = parseInt(localStorage.getItem('local_elem_best_streak') || '0');
    barStreak.innerText = currentStreak;
    barBest.innerText = bestStreak;
}

// --- CORE GAME ENGINE ---
function initGame() {
    gridContainer.innerHTML = "";
    gridContainer.style.animation = 'none';
    setTimeout(() => { gridContainer.style.animation = ''; }, 10);
    
    guessedElements.clear();
    guessCount = 0;
    gameActive = true;
    statusMsg.innerHTML = "";
    inputField.value = "";
    inputField.disabled = false;
    submitBtn.disabled = false;
    giveupBtn.disabled = false;
    winModal.classList.remove('show');
    
    secretElement = elementData[Math.floor(Math.random() * elementData.length)];
    startTime = Date.now();
    
    buildTable();
    updateTopStreakBar();
    inputField.focus();
}

function buildTable() {
    for (let r = 1; r <= 10; r++) {
        if (r === 8) {
            let spacer = document.createElement('div');
            spacer.className = "spacer-row";
            gridContainer.appendChild(spacer);
            continue;
        }
        for (let c = 1; c <= 18; c++) {
            const cell = document.createElement('div');
            const el = elementData.find(item => item.row === r && item.col === c);
            if (el) {
                cell.className = "cell";
                cell.innerText = el.symbol;
                tileMap[el.name] = cell;
            } else {
                cell.className = "empty";
            }
            gridContainer.appendChild(cell);
        }
    }
}

// Typo Matching Formula
function getTypoCount(a, b) {
    if (a.length === 0) return b.length;
    if (b.length === 0) return a.length;
    let matrix = [];
    for (let i = 0; i <= b.length; i++) matrix[i] = [i];
    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
            if (b.charAt(i - 1) === a.charAt(j - 1)) {
                matrix[i][j] = matrix[i - 1][j - 1];
            } else {
                matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
            }
        }
    }
    return matrix[b.length][a.length];
}

function getDirectionHint(current, target) {
    let rowDel = target.row - current.row;
    let colDel = target.col - current.col;
    if (current.row >= 9) { if(target.row < 9) return "⬆️ Up"; }
    if (target.row >= 9) { if(current.row < 9) return "⬇️ Down"; }
    if (rowDel === 0 && colDel > 0) return "➡️ Right";
    if (rowDel === 0 && colDel < 0) return "⬅️ Left";
    if (rowDel > 0 && colDel === 0) return "⬇️ Down";
    if (rowDel < 0 && colDel === 0) return "⬆️ Up";
    if (rowDel < 0 && colDel > 0) return "↗️ Up-Right";
    if (rowDel < 0 && colDel < 0) return "↖️ Up-Left";
    if (rowDel > 0 && colDel > 0) return "↘️ Down-Right";
    if (rowDel > 0 && colDel < 0) return "↙️ Down-Left";
    return "";
}

function processGuess() {
    startAudioContext();
    if (!gameActive) return;
    const rawInput = inputField.value.trim().toLowerCase();
    if (!rawInput) return;
    
    inputField.value = ""; 
    let foundEl = elementData.find(el => el.name === rawInput || el.symbol.toLowerCase() === rawInput);
    
    if (!foundEl) {
        let bestMatch = null;
        let lowestTypos = Infinity;
        for (let el of elementData) {
            let typos = getTypoCount(rawInput, el.name);
            if (typos < lowestTypos) { lowestTypos = typos; bestMatch = el; }
        }
        let maxTyposAllowed = rawInput.length <= 4 ? 1 : 2;
        if (lowestTypos <= maxTyposAllowed) { foundEl = bestMatch; }
    }
    
    if (!foundEl) {
        statusMsg.innerHTML = "❌ Not a valid element name!";
        statusMsg.className = "txt-hot";
        return;
    }
    
    if (guessedElements.has(foundEl.name)) {
        statusMsg.innerHTML = `⚠️ You already guessed ${foundEl.symbol}!`;
        statusMsg.className = "txt-warm";
        return;
    }
    
    guessCount++;
    const formatName = foundEl.name.charAt(0).toUpperCase() + foundEl.name.slice(1);
    guessedElements.add(foundEl.name);
    const targetTile = tileMap[foundEl.name];
    
    const rowDiff = Math.abs(foundEl.row - secretElement.row);
    const colDiff = Math.abs(foundEl.col - secretElement.col);
    const distance = rowDiff + colDiff;
    const arrowHint = getDirectionHint(foundEl, secretElement);
    
    if (distance === 0) {
        targetTile.className = "cell correct";
        endGame(true);
    } else if (distance <= 2) {
        targetTile.className = "cell hot";
        statusMsg.innerHTML = `🔥 <b>${formatName} (${foundEl.symbol})</b> is Burning Hot! (Go ${arrowHint})`;
        statusMsg.className = "txt-hot";
    } else if (distance <= 4) {
        targetTile.className = "cell warm";
        statusMsg.innerHTML = `🌤️ <b>${formatName} (${foundEl.symbol})</b> is Warm. (Go ${arrowHint})`;
        statusMsg.className = "txt-warm";
    } else if (distance <= 8) {
        targetTile.className = "cell cold";
        statusMsg.innerHTML = `❄️ <b>${formatName} (${foundEl.symbol})</b> is Chilly. (Go ${arrowHint})`;
        statusMsg.className = "txt-cold";
    } else {
        targetTile.className = "cell freezing";
        statusMsg.innerHTML = `🥶 <b>${formatName} (${foundEl.symbol})</b> is Freezing Cold! (Go ${arrowHint})`;
        statusMsg.className = "txt-freezing";
    }
}

function handleGiveUp() {
    startAudioContext();
    if (!gameActive) return;
    const answerTile = tileMap[secretElement.name];
    answerTile.className = "cell giveup-reveal";
    endGame(false);
}

function endGame(isWin) {
    gameActive = false;
    inputField.disabled = true;
    submitBtn.disabled = true;
    giveupBtn.disabled = true;
    
    const timeElapsed = Math.floor((Date.now() - startTime) / 1000);
    
    let currentStreak = parseInt(localStorage.getItem('local_elem_streak') || '0');
    let bestStreak = parseInt(localStorage.getItem('local_elem_best_streak') || '0');
    
    if (isWin) {
        currentStreak++;
        if (currentStreak > bestStreak) bestStreak = currentStreak;
        modalTitle.innerText = "🎉 Victory!";
        modalTitle.style.color = "#22c55e";
        modalBorder.style.borderColor = "#22c55e";
    } else {
        currentStreak = 0;
        modalTitle.innerText = "💀 Unlucky!";
        modalTitle.style.color = "#ef4444";
        modalBorder.style.borderColor = "#ef4444";
    }
    
    localStorage.setItem('local_elem_streak', currentStreak);
    localStorage.setItem('local_elem_best_streak', bestStreak);
    
    secretReveal.innerText = `${secretElement.name.charAt(0).toUpperCase() + secretElement.name.slice(1)} (${secretElement.symbol})`;
    statGuesses.innerText = guessCount;
    statTime.innerText = `${timeElapsed}s`;
    statStreak.innerText = currentStreak;
    statBestStreak.innerText = bestStreak;
    
    updateTopStreakBar();
    
    setTimeout(() => { winModal.classList.add('show'); }, 700);
}

submitBtn.addEventListener('click', processGuess);
